<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Calendar card (white) -->
  <rect x="5" y="10" width="22" height="17" rx="2.5" fill="white"/>

  <!-- Header strip (indigo) -->
  <rect x="5" y="10" width="22" height="6.5" rx="2.5" fill="#4338ca"/>
  <!-- Flatten bottom edge of header strip -->
  <rect x="5" y="13.5" width="22" height="3" fill="#4338ca"/>

  <!-- Left pin -->
  <rect x="9.5" y="7" width="2.5" height="6" rx="1.25" fill="white" opacity="0.9"/>
  <!-- Right pin -->
  <rect x="20" y="7" width="2.5" height="6" rx="1.25" fill="white" opacity="0.9"/>

  <!-- Day squares row 1 -->
  <rect x="8"    y="20.5" width="3.5" height="3.5" rx="1" fill="#6366f1"/>
  <rect x="14.2" y="20.5" width="3.5" height="3.5" rx="1" fill="#6366f1"/>
  <rect x="20.5" y="20.5" width="3.5" height="3.5" rx="1" fill="#6366f1"/>
</svg>
